name: Build and deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  actions: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # If you need native build tools for any native deps, uncomment the next step
      # - name: Install system build deps
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y build-essential python3 libsqlite3-dev

      - name: Install dependencies
        # use install because there is no package-lock.json in the repo
        run: npm install

      - name: Build
        env:
          GEMINI_API_KEY: ''
        run: npm run build

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
